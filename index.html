<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Códigos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:32px;width:100%;max-width:680px;box-shadow:0 25px 50px rgba(0,0,0,0.4);}
h1{color:#fff;font-size:1.45rem;font-weight:700;text-align:center;margin-bottom:4px;}
.subtitle{color:rgba(255,255,255,0.4);font-size:0.8rem;text-align:center;margin-bottom:22px;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.mode-btn{padding:11px 8px;border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4;}
.mode-btn .icon{display:block;font-size:1.2rem;margin-bottom:3px;}
.mode-btn.active{background:linear-gradient(135deg,#4f8ef7,#a855f7);border-color:transparent;color:#fff;}
.mode-btn:hover:not(.active){background:rgba(255,255,255,0.09);color:#fff;}
label{display:block;color:rgba(255,255,255,0.62);font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
input[type="text"],input[type="number"],textarea,select{width:100%;padding:10px 13px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.13);background:rgba(255,255,255,0.07);color:#fff;font-size:0.88rem;outline:none;transition:border-color .2s;}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.27);}
input:focus,textarea:focus,select:focus{border-color:#4f8ef7;}
select option{background:#1a1a2e;}
textarea{resize:vertical;min-height:95px;font-family:monospace;line-height:1.6;}
input[type="color"]{padding:3px 6px;height:38px;cursor:pointer;border-radius:10px;}
input[type="range"]{width:100%;accent-color:#4f8ef7;cursor:pointer;}
.field{margin-bottom:14px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.opts.three{grid-template-columns:1fr 1fr 1fr;}
.hint{color:rgba(255,255,255,0.3);font-size:0.72rem;margin-top:5px;}
.error{color:#f87171;font-size:0.75rem;margin-top:4px;display:none;}
.error.on{display:block;}
.btn-primary{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#4f8ef7,#a855f7);color:#fff;font-size:0.92rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.single-result{background:#fff;border-radius:14px;padding:14px;display:none;flex-direction:column;align-items:center;margin-top:14px;}
.single-result.on{display:flex;}
.single-result canvas{max-width:100%;border-radius:4px;}
.action-row{display:flex;gap:8px;width:100%;margin-top:10px;}
.btn-dl,.btn-zpl{flex:1;padding:10px 6px;border-radius:10px;font-size:0.82rem;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:inline-block;transition:background .2s;}
.btn-dl{border:1.5px solid rgba(79,142,247,0.55);background:transparent;color:#4f8ef7;}
.btn-dl:hover{background:rgba(79,142,247,0.1);}
.btn-zpl{border:1.5px solid rgba(168,85,247,0.55);background:transparent;color:#a855f7;}
.btn-zpl:hover{background:rgba(168,85,247,0.1);}
.btn-zpl.copied{border-color:#22c55e;color:#22c55e;}
.results{margin-top:18px;display:none;}
.results.on{display:block;}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
.results-count{color:rgba(255,255,255,0.5);font-size:0.8rem;}
.batch-actions{display:flex;gap:7px;}
.btn-zip,.btn-zpl-batch{padding:7px 13px;border-radius:9px;border:none;font-size:0.78rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn-zip{background:linear-gradient(135deg,#4f8ef7,#a855f7);color:#fff;}
.btn-zpl-batch{background:rgba(168,85,247,0.2);border:1.5px solid rgba(168,85,247,0.5);color:#a855f7;}
.btn-zip:disabled,.btn-zpl-batch:disabled{opacity:.5;cursor:not-allowed;}
.list{display:flex;flex-direction:column;gap:12px;max-height:480px;overflow-y:auto;padding-right:4px;}
.list::-webkit-scrollbar{width:4px;}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:3px;}
.list-item{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:14px;}
.item-preview{flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.item-preview canvas{border-radius:5px;display:block;}
.item-info{flex:1;min-width:0;}
.item-name{color:#111;font-size:0.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{color:#777;font-size:0.68rem;margin-top:2px;}
.item-actions{display:flex;gap:6px;flex-shrink:0;flex-direction:column;}
.item-dl,.item-zpl{padding:6px 12px;border-radius:7px;font-size:0.73rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;text-align:center;}
.item-dl{border:1.5px solid #4f8ef7;color:#4f8ef7;background:transparent;}
.item-zpl{border:1.5px solid #a855f7;color:#a855f7;background:transparent;}
.item-zpl:hover{background:rgba(168,85,247,0.08);}
.item-zpl.copied{border-color:#22c55e;color:#22c55e;}
.item-dl:hover{background:rgba(79,142,247,0.08);}
.label-info{background:rgba(79,142,247,0.09);border:1px solid rgba(79,142,247,0.22);border-radius:9px;padding:8px 13px;color:rgba(255,255,255,0.55);font-size:0.72rem;margin-bottom:14px;}
.label-info strong{color:#4f8ef7;}
.panel{display:none;}
.panel.on{display:block;}
#qrHidden{position:absolute;left:-9999px;top:-9999px;}
</style>
</head>
<body>
<div class="card">
  <h1>🔳 Generador de Códigos</h1>
  <p class="subtitle">Code 128 · QR · Zebra 203 dpi · 8×6 cm</p>

  <div class="mode-grid">
    <button class="mode-btn active" onclick="setMode('bc-single')"><span class="icon">▮▯▮▮▯</span>Code 128 · Individual</button>
    <button class="mode-btn" onclick="setMode('bc-batch')"><span class="icon">▮▯▮▮▯</span>Code 128 · Lote</button>
    <button class="mode-btn" onclick="setMode('qr-single')"><span class="icon">⬛</span>QR · Individual</button>
    <button class="mode-btn" onclick="setMode('qr-batch')"><span class="icon">⬛</span>QR · Lote</button>
  </div>

  <div class="label-info">📐 Salida: <strong>638 × 480 px</strong> — 8×6 cm @ <strong>203 dpi</strong> (Zebra)</div>

  <!-- ===== BC SINGLE ===== -->
  <div class="panel on" id="panel-bc-single">
    <div class="opts">
      <div class="field"><label>Grosor barras</label>
        <select id="s-lw"><option value="2">Normal</option><option value="3" selected>Ancho</option><option value="4">Extra ancho</option></select>
      </div>
      <div class="field"><label>Mostrar texto</label>
        <select id="s-txt"><option value="true" selected>Sí</option><option value="false">No</option></select>
      </div>
    </div>
    <div class="field"><label>Alto código de barras — <span id="s-bh-val">55</span>%</label>
      <input type="range" id="s-bh" min="20" max="75" value="55" oninput="document.getElementById('s-bh-val').textContent=this.value">
    </div>
    <div class="field"><label>Tamaño texto — <span id="s-tsz-val">72</span>px</label>
      <input type="range" id="s-tsz" min="16" max="120" value="72" oninput="document.getElementById('s-tsz-val').textContent=this.value">
    </div>
    <div class="field"><label>Texto o número</label>
      <input type="text" id="s-val" placeholder="Ej: ABC-12345" maxlength="80">
      <div class="error" id="s-err">Ingresa un valor.</div>
    </div>
    <button class="btn-primary" onclick="genBCSingle()">Generar código de barras</button>
    <div class="single-result" id="s-result">
      <canvas id="s-canvas"></canvas>
      <div class="action-row">
        <a class="btn-dl" id="s-dl">⬇ Descargar PNG</a>
        <button class="btn-zpl" id="s-zpl" onclick="copyZPL('bc')">⎙ Copiar ZPL Zebra</button>
      </div>
    </div>
  </div>

  <!-- ===== BC BATCH ===== -->
  <div class="panel" id="panel-bc-batch">
    <div class="opts">
      <div class="field"><label>Grosor barras</label>
        <select id="b-lw"><option value="2">Normal</option><option value="3" selected>Ancho</option><option value="4">Extra ancho</option></select>
      </div>
      <div class="field"><label>Mostrar texto</label>
        <select id="b-txt"><option value="true" selected>Sí</option><option value="false">No</option></select>
      </div>
    </div>
    <div class="field"><label>Alto código de barras — <span id="b-bh-val">55</span>%</label>
      <input type="range" id="b-bh" min="20" max="75" value="55" oninput="document.getElementById('b-bh-val').textContent=this.value">
    </div>
    <div class="field"><label>Tamaño texto — <span id="b-tsz-val">72</span>px</label>
      <input type="range" id="b-tsz" min="16" max="120" value="72" oninput="document.getElementById('b-tsz-val').textContent=this.value">
    </div>
    <div class="field"><label>Códigos (uno por línea)</label>
      <textarea id="b-val" placeholder="ABC-001&#10;ABC-002&#10;PRODUCTO-XYZ"></textarea>
      <div class="hint">Cada línea → una etiqueta.</div>
      <div class="error" id="b-err">Ingresa al menos un valor.</div>
    </div>
    <button class="btn-primary" onclick="genBCBatch()">Generar lote</button>
    <div class="results" id="b-results">
      <div class="results-header">
        <span class="results-count" id="b-count"></span>
        <div class="batch-actions">
          <button class="btn-zpl-batch" id="b-zpl-batch" onclick="exportZPLBatch('bc')">⎙ Exportar ZPL (.txt)</button>
          <button class="btn-zip" id="b-zip" onclick="dlZip('bc')">⬇ Descargar ZIP</button>
        </div>
      </div>
      <div class="list" id="b-list"></div>
    </div>
  </div>

  <!-- ===== QR SINGLE ===== -->
  <div class="panel" id="panel-qr-single">
    <div class="opts three">
      <div class="field"><label>Corrección</label>
        <select id="qs-ecc"><option value="L">L–7%</option><option value="M" selected>M–15%</option><option value="Q">Q–25%</option><option value="H">H–30%</option></select>
      </div>
      <div class="field"><label>Color QR</label><input type="color" id="qs-dark" value="#000000"></div>
      <div class="field"><label>Fondo</label><input type="color" id="qs-light" value="#ffffff"></div>
    </div>
    <div class="field"><label>Tamaño QR — <span id="qs-qsz-val">75</span>%</label>
      <input type="range" id="qs-qsz" min="30" max="88" value="75" oninput="document.getElementById('qs-qsz-val').textContent=this.value">
    </div>
    <div class="field"><label>Tamaño texto — <span id="qs-tsz-val">68</span>px</label>
      <input type="range" id="qs-tsz" min="16" max="120" value="68" oninput="document.getElementById('qs-tsz-val').textContent=this.value">
    </div>
    <div class="field"><label>Texto o URL</label>
      <input type="text" id="qs-val" placeholder="Ej: https://ejemplo.com">
      <div class="error" id="qs-err">Ingresa un valor.</div>
    </div>
    <button class="btn-primary" onclick="genQRSingle()">Generar QR</button>
    <div class="single-result" id="qs-result">
      <canvas id="qs-canvas"></canvas>
      <div class="action-row">
        <a class="btn-dl" id="qs-dl">⬇ Descargar PNG</a>
        <button class="btn-zpl" id="qs-zpl" onclick="copyZPL('qr')">⎙ Copiar ZPL Zebra</button>
      </div>
    </div>
  </div>

  <!-- ===== QR BATCH ===== -->
  <div class="panel" id="panel-qr-batch">
    <div class="opts three">
      <div class="field"><label>Corrección</label>
        <select id="qb-ecc"><option value="L">L–7%</option><option value="M" selected>M–15%</option><option value="Q">Q–25%</option><option value="H">H–30%</option></select>
      </div>
      <div class="field"><label>Color QR</label><input type="color" id="qb-dark" value="#000000"></div>
      <div class="field"><label>Fondo</label><input type="color" id="qb-light" value="#ffffff"></div>
    </div>
    <div class="field"><label>Tamaño QR — <span id="qb-qsz-val">75</span>%</label>
      <input type="range" id="qb-qsz" min="30" max="88" value="75" oninput="document.getElementById('qb-qsz-val').textContent=this.value">
    </div>
    <div class="field"><label>Tamaño texto — <span id="qb-tsz-val">68</span>px</label>
      <input type="range" id="qb-tsz" min="16" max="120" value="68" oninput="document.getElementById('qb-tsz-val').textContent=this.value">
    </div>
    <div class="field"><label>Textos / URLs (uno por línea)</label>
      <textarea id="qb-val" placeholder="https://ejemplo.com&#10;Producto ABC&#10;12345"></textarea>
      <div class="hint">Cada línea → una etiqueta QR.</div>
      <div class="error" id="qb-err">Ingresa al menos un valor.</div>
    </div>
    <button class="btn-primary" onclick="genQRBatch()">Generar lote QR</button>
    <div class="results" id="qb-results">
      <div class="results-header">
        <span class="results-count" id="qb-count"></span>
        <div class="batch-actions">
          <button class="btn-zpl-batch" id="qb-zpl-batch" onclick="exportZPLBatch('qr')">⎙ Exportar ZPL (.txt)</button>
          <button class="btn-zip" id="qb-zip" onclick="dlZip('qr')">⬇ Descargar ZIP</button>
        </div>
      </div>
      <div class="list" id="qb-list"></div>
    </div>
  </div>
</div>
<div id="qrHidden"></div>

<script>
const LW=638, LH=480;
// Preview dimensions — larger for readability
const PW=200, PH=150;

let lastBC='', lastQR='';
let bcBatchData=[], qrBatchData=[];

function setMode(m){
  ['bc-single','bc-batch','qr-single','qr-batch'].forEach((id,i)=>{
    document.querySelectorAll('.mode-btn')[i].classList.toggle('active',id===m);
    document.getElementById('panel-'+id).classList.toggle('on',id===m);
  });
}

function sanitizeZPL(v){
  return v.split('').filter(ch=>{const c=ch.charCodeAt(0);return c>=32&&c<=126;}).join('');
}

// ZPL Code128 — wide barcode (BY multiplier 4), tall (250 dots), centered with margins
// Label 638w × 480h dots. ^FO x=20 leaves margin each side.
// Text centered at bottom with ^FB, font 90px
function zplBarcode(value){
  const v=sanitizeZPL(value);
  return `^XA\r\n^PW638\r\n^LL480\r\n^CI28\r\n^FO20,20^BY4,3,250^BCN,250,N,N,N^FD${v}^FS\r\n^FO0,295^A0N,90,90^FB598,1,0,C^FD${v}^FS\r\n^XZ`;
}

// ZPL QR — magnification 7 → each module=7 dots.
// Version 2 QR (25 modules) → 25×7=175 dots + quiet zone ~28 dots each side = ~231 dots total
// Center x = (638-231)/2 = 203. QR ends at y=10+231=241. Text at y=260 with 19dot gap.
// Font 75dots tall → text ends at 260+75=335, well within 480.
function zplQR(value){
  const v=sanitizeZPL(value);
  // Mag 8: ~29 modules × 8 = 232 dots QR. Center x=(638-232)/2=203. QR ends ~y=242.
  // Text at y=370, font 80dots → ends y=450, within 480. Clear separation.
  // Mag 12, QR centered: x adjusted to 195 to compensate real QR width offset.
  // QR at top y=5, text confirmed correct at bottom y=378.
  // Text pushed aggressively to y=420, font 55dots → ends y=475. Forces clear separation.
  // ^LH shifts label origin. QR at y=5 (top), text fixed at y=420.
  // ZT411 origin Y=0 is at BOTTOM, grows upward.
  // QR at top of label = high Y value. Text at bottom = low Y value.
  // Label height 480dots. QR ~330dots tall (mag10). QR starts at y=480-330-5=145, centered x=195.
  // Text at y=5 (bottom), font 55dots.
  return `^XA\r\n^PW638\r\n^LL480\r\n^CI28\r\n^FO195,145^BQN,2,10^FDQA,${v}^FS\r\n^FO0,5^A0N,55,55^FB638,1,0,C^FD${v}^FS\r\n^XZ`;
}

function copyZPL(type){
  const val=type==='bc'?lastBC:lastQR;
  if(!val)return;
  const zpl=type==='bc'?zplBarcode(val):zplQR(val);
  navigator.clipboard.writeText(zpl).then(()=>{
    const btn=document.getElementById((type==='bc'?'s':'qs')+'-zpl');
    const orig=btn.textContent; btn.textContent='✓ Copiado!'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2000);
  });
}

function copyItemZPL(val,type,btn){
  const zpl=type==='bc'?zplBarcode(val):zplQR(val);
  navigator.clipboard.writeText(zpl).then(()=>{
    const orig=btn.textContent; btn.textContent='✓ Copiado'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2000);
  });
}

function exportZPLBatch(type){
  const data=type==='bc'?bcBatchData:qrBatchData;
  if(!data.length)return;
  const blocks=data.map(d=>type==='bc'?zplBarcode(d.val):zplQR(d.val));
  const content=blocks.join('\r\n\r\n');
  const blob=new Blob([content],{type:'text/plain'});
  const reader=new FileReader();
  reader.onload=()=>{
    const a=document.createElement('a');
    a.href=reader.result;
    a.download=(type==='bc'?'zpl-codigos-barras':'zpl-codigos-qr')+'.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  reader.readAsDataURL(blob);
}

// ── BC canvas (PNG output) ──
// Uses wide bar width (lw=3+ by default), renders barcode across full label width with padding
function bcLabelCanvas(value, lw, showTxt, bhPct, tSzPx){
  return new Promise((res,rej)=>{
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    document.body.appendChild(svg);
    const bcH=Math.round(LH*(bhPct/100));
    try{
      // Use full width minus small padding so bars are wide and spaced
      JsBarcode(svg, value, {
        format:'CODE128', lineColor:'#000',
        width: lw,          // bar module width in px — higher = wider/more spaced bars
        height: bcH,
        displayValue: false,
        margin: 18,         // generous side margins
        background:'#fff'
      });
    }catch(e){document.body.removeChild(svg);rej(e);return;}
    const svgEl=svg;
    // Force SVG to fill label width
    svgEl.setAttribute('width', LW);
    const svgStr='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(new XMLSerializer().serializeToString(svgEl));
    document.body.removeChild(svg);
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=LW; c.height=LH;
      const ctx=c.getContext('2d');
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,LW,LH);
      const topH=Math.round(LH*0.64);
      const bY=Math.round((topH-bcH)/2);
      ctx.drawImage(img, 0, bY, LW, bcH);
      if(showTxt){
        let fs=tSzPx;
        ctx.font=`bold ${fs}px 'Segoe UI',Arial,sans-serif`;
        while(ctx.measureText(value).width>LW-24&&fs>14){fs--;ctx.font=`bold ${fs}px 'Segoe UI',Arial,sans-serif`;}
        ctx.fillStyle='#000'; ctx.textAlign='center'; ctx.textBaseline='middle';
        const tzY=topH; const tzH=LH-topH;
        ctx.fillText(value, LW/2, tzY+tzH/2);
      }
      res(c);
    };
    img.onerror=rej; img.src=svgStr;
  });
}

// ── QR canvas (PNG output) ──
function qrLabelCanvas(value, ecc, dark, light, qSzPct, tSzPx){
  return new Promise(res=>{
    const eccMap={L:QRCode.CorrectLevel.L,M:QRCode.CorrectLevel.M,Q:QRCode.CorrectLevel.Q,H:QRCode.CorrectLevel.H};
    const hidden=document.getElementById('qrHidden');
    hidden.innerHTML='';
    const qrSize=Math.round(LH*(qSzPct/100));
    new QRCode(hidden,{text:value,width:qrSize,height:qrSize,colorDark:dark,colorLight:light,correctLevel:eccMap[ecc]});
    setTimeout(()=>{
      const src=hidden.querySelector('canvas');
      const c=document.createElement('canvas');
      c.width=LW; c.height=LH;
      const ctx=c.getContext('2d');
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,LW,LH);
      const qrX=Math.round((LW-qrSize)/2);
      const qrY=8;
      if(src) ctx.drawImage(src,qrX,qrY,qrSize,qrSize);
      const textAreaY=qrY+qrSize+10;
      const availH=LH-textAreaY-8;
      let fs=Math.min(tSzPx, availH);
      ctx.font=`bold ${fs}px 'Segoe UI',Arial,sans-serif`;
      while(ctx.measureText(value).width>LW-14&&fs>12){fs--;ctx.font=`bold ${fs}px 'Segoe UI',Arial,sans-serif`;}
      ctx.fillStyle='#000'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(value, LW/2, textAreaY+availH/2);
      res(c);
    },130);
  });
}

function safeName(v){return v.replace(/[^a-zA-Z0-9_\-\.]/g,'_').substring(0,80);}

// Embed 203 DPI metadata into PNG canvas output
// PNG pHYs chunk: 203 DPI = 203 * 39.3701 = ~7992 pixels per meter
function canvasToBase64With203DPI(canvas){
  const base64 = canvas.toDataURL('image/png');
  const binary = atob(base64.split(',')[1]);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);

  // Find IDAT chunk position (after IHDR = 8 sig + 4len + 4type + 13data + 4crc = 33 bytes, then 4+4+16 = start at 33)
  // Insert pHYs chunk after IHDR chunk (at byte 33)
  const PPM = Math.round(203 * 39.3701); // 203 DPI in pixels per meter = 7992

  // Build pHYs chunk: 4 bytes length + 4 bytes type + 9 bytes data + 4 bytes CRC
  function u32(val){ return [(val>>24)&0xFF,(val>>16)&0xFF,(val>>8)&0xFF,val&0xFF]; }

  const typeBytes = [0x70,0x48,0x59,0x73]; // "pHYs"
  const data = [...u32(PPM), ...u32(PPM), 0x01]; // x DPI, y DPI, unit=meter

  // CRC32 of type+data
  function crc32(buf){
    let c=0xFFFFFFFF;
    const t=new Uint8Array(buf);
    for(let i=0;i<t.length;i++){
      c^=t[i];
      for(let j=0;j<8;j++) c=c&1?(c>>>1)^0xEDB88320:(c>>>1);
    }
    return (c^0xFFFFFFFF)>>>0;
  }
  const crcVal = crc32([...typeBytes,...data]);
  const physChunk = new Uint8Array([...u32(9),...typeBytes,...data,...u32(crcVal)]);

  // Insert pHYs after IHDR: signature(8) + IHDR length(4) + IHDR type(4) + IHDR data(13) + IHDR crc(4) = 33
  const insertAt = 33;
  const result = new Uint8Array(bytes.length + physChunk.length);
  result.set(bytes.slice(0, insertAt), 0);
  result.set(physChunk, insertAt);
  result.set(bytes.slice(insertAt), insertAt + physChunk.length);

  // Convert back to base64
  let out = '';
  result.forEach(b => out += String.fromCharCode(b));
  return 'data:image/png;base64,' + btoa(out);
}

function makePreview(srcCanvas){
  const p=document.createElement('canvas');
  p.width=PW; p.height=PH;
  p.getContext('2d').drawImage(srcCanvas,0,0,PW,PH);
  return p;
}

// ── BC SINGLE ──
document.getElementById('s-val').addEventListener('keydown',e=>{if(e.key==='Enter')genBCSingle();});
async function genBCSingle(){
  const val=document.getElementById('s-val').value.trim();
  const err=document.getElementById('s-err');
  if(!val){err.classList.add('on');return;} err.classList.remove('on');
  try{
    const c=await bcLabelCanvas(val,+document.getElementById('s-lw').value,document.getElementById('s-txt').value==='true',+document.getElementById('s-bh').value,+document.getElementById('s-tsz').value);
    const disp=document.getElementById('s-canvas');
    disp.width=c.width; disp.height=c.height;
    disp.getContext('2d').drawImage(c,0,0);
    const dl=document.getElementById('s-dl');
    dl.href=c.toDataURL('image/png'); dl.download=safeName(val)+'.png';
    lastBC=val;
    document.getElementById('s-result').classList.add('on');
  }catch(e){err.textContent='Error al generar.';err.classList.add('on');}
}

// ── BC BATCH ──
async function genBCBatch(){
  const lines=document.getElementById('b-val').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const err=document.getElementById('b-err');
  if(!lines.length){err.classList.add('on');return;} err.classList.remove('on');
  bcBatchData=[]; const list=document.getElementById('b-list'); list.innerHTML='';
  const lw=+document.getElementById('b-lw').value;
  const showTxt=document.getElementById('b-txt').value==='true';
  const bh=+document.getElementById('b-bh').value;
  const tsz=+document.getElementById('b-tsz').value;
  for(const val of lines){
    try{
      const c=await bcLabelCanvas(val,lw,showTxt,bh,tsz);
      const dataUrl=c.toDataURL('image/png');
      bcBatchData.push({val,dataUrl});
      const prev=makePreview(c);
      const item=document.createElement('div'); item.className='list-item';
      const pi=document.createElement('div'); pi.className='item-preview'; pi.appendChild(prev);
      const info=document.createElement('div'); info.className='item-info';
      info.innerHTML=`<div class="item-name">${val}</div><div class="item-sub">638×480px · Code128 · 203dpi</div>`;
      const acts=document.createElement('div'); acts.className='item-actions';
      const a=document.createElement('a'); a.className='item-dl'; a.textContent='⬇ PNG'; a.href=dataUrl; a.download=safeName(val)+'.png';
      const z=document.createElement('button'); z.className='item-zpl'; z.textContent='⎙ ZPL';
      z.onclick=()=>copyItemZPL(val,'bc',z);
      acts.appendChild(a); acts.appendChild(z);
      item.appendChild(pi); item.appendChild(info); item.appendChild(acts);
      list.appendChild(item);
    }catch(e){}
  }
  document.getElementById('b-count').textContent=`${bcBatchData.length} código${bcBatchData.length!==1?'s':''} generado${bcBatchData.length!==1?'s':''}`;
  document.getElementById('b-results').classList.add('on');
}

// ── ZIP ──
async function dlZip(type){
  const data=type==='bc'?bcBatchData:qrBatchData;
  const btn=document.getElementById(type==='bc'?'b-zip':'qb-zip');
  btn.disabled=true; btn.textContent='Generando ZIP...';
  const zip=new JSZip();
  for(const {val,dataUrl} of data) zip.file(safeName(val)+'.png',dataUrl.split(',')[1],{base64:true});
  const b64=await zip.generateAsync({type:'base64'});
  const a=document.createElement('a');
  a.href='data:application/zip;base64,'+b64;
  a.download=(type==='bc'?'codigos-barras':'codigos-qr')+'.zip';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  btn.disabled=false; btn.textContent='⬇ Descargar ZIP';
}
